services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["bash", "./docker-entrypoint.sh"]
    environment:
      DB_HOST: mysql
      DB_PASSWORD: password
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:8080
      NIGHTWATCH_DASHBOARD_URL: http://localhost:8080
      RAILS_ENV: development
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_bundle:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  sidekiq:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    environment:
      DB_HOST: mysql
      DB_PASSWORD: password
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - backend_bundle:/usr/local/bundle
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_PROXY_TARGET: http://backend:3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_bundle:
  frontend_node_modules:
